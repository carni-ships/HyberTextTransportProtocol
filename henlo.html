<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Henlo World!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a0a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 800;
      background: linear-gradient(135deg, #f5a623, #e8507a, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    p {
      font-size: 1.1rem;
      color: #a0859e;
      max-width: 420px;
      line-height: 1.6;
    }
    .badge {
      margin-top: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.8rem;
      color: #a0859e;
      letter-spacing: 0.04em;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a855f7;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <h1>Henlo World!</h1>
  <p>This page lives forever as calldata on Berachain. No servers. No hosting fees. Just the chain.</p>
  <div class="badge">
    <span class="dot"></span>
    Stored on-chain via HyberText
  </div>
</body>
</html>
